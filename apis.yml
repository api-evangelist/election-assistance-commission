    description: >-
      Public-facing presence of the U.S. Election Assistance Commission. The
      EAC publishes Election Administration and Voting Survey (EAVS)
      datasets, codebooks, voluntary voting system guidelines, voter list
      maintenance studies, and accessibility reports. Machine-readable
      access is currently limited to dataset downloads and an RSS news feed
      rather than a REST API.
